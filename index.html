<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d0d;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 420px;
        }

        /* Main Player Card */
        .player-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e, #0f3460);
            border-radius: 30px;
            padding: 35px 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        /* Animated bg blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            transition: all 1s ease;
        }

        .bg-blob-1 {
            width: 200px;
            height: 200px;
            background: var(--accent, #7c3aed);
            top: -50px;
            right: -50px;
            animation: blobMove1 8s ease-in-out infinite;
        }

        .bg-blob-2 {
            width: 150px;
            height: 150px;
            background: var(--accent2, #06b6d4);
            bottom: -30px;
            left: -30px;
            animation: blobMove2 10s ease-in-out infinite;
        }

        @keyframes blobMove1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-20px, 20px) scale(1.2); }
        }

        @keyframes blobMove2 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.1); }
        }

        /* Album Art */
        .album-section {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .album-ring {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            padding: 8px;
            background: conic-gradient(var(--accent, #7c3aed), var(--accent2, #06b6d4), var(--accent, #7c3aed));
            animation: spin 8s linear infinite;
        }

        .album-ring.paused { animation-play-state: paused; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .album-art {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1e1e2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            position: relative;
            overflow: hidden;
            animation: spin 8s linear infinite reverse;
        }

        .album-art.paused { animation-play-state: paused; }

        /* Visualizer Bars */
        .visualizer {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 35px;
        }

        .viz-bar {
            width: 4px;
            border-radius: 2px;
            background: var(--accent, #7c3aed);
            transition: height 0.1s;
            opacity: 0.8;
        }

        .viz-bar.playing {
            animation: vizAnim 0.5s ease infinite alternate;
        }

        .viz-bar:nth-child(1) { animation-delay: 0.0s; }
        .viz-bar:nth-child(2) { animation-delay: 0.1s; }
        .viz-bar:nth-child(3) { animation-delay: 0.2s; }
        .viz-bar:nth-child(4) { animation-delay: 0.3s; }
        .viz-bar:nth-child(5) { animation-delay: 0.4s; }
        .viz-bar:nth-child(6) { animation-delay: 0.15s; }
        .viz-bar:nth-child(7) { animation-delay: 0.05s; }
        .viz-bar:nth-child(8) { animation-delay: 0.25s; }

        @keyframes vizAnim {
            from { height: 4px; }
            to { height: 30px; }
        }

        /* Song Info */
        .song-info {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .song-title {
            color: white;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-weight: 400;
        }

        .song-tags {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .tag {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Progress */
        .progress-section {
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .progress-track {
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: visible;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent, #7c3aed), var(--accent2, #06b6d4));
            position: relative;
            transition: width 0.5s linear;
        }

        .progress-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            position: absolute;
            right: -7px;
            top: -5px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .progress-track:hover .progress-dot { transform: scale(1.3); }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .ctrl-btn:hover { transform: scale(1.2); }
        .ctrl-btn:active { transform: scale(0.9); }

        .ctrl-btn.active {
            color: var(--accent, #7c3aed);
            text-shadow: 0 0 10px var(--accent, #7c3aed);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent, #7c3aed), var(--accent2, #06b6d4));
            border: none;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(124,58,237,0.4), 0 0 0 0 rgba(124,58,237,0.2);
            transition: all 0.3s;
            animation: playPulse 2s ease infinite;
        }

        @keyframes playPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(124,58,237,0.4), 0 0 0 0 rgba(124,58,237,0.2); }
            50% { box-shadow: 0 10px 30px rgba(124,58,237,0.4), 0 0 0 15px rgba(124,58,237,0); }
        }

        .play-btn.paused { animation: none; }
        .play-btn:hover { transform: scale(1.05); }

        /* Volume */
        .volume-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .vol-icon { font-size: 16px; }

        .volume-slider {
            flex: 1;
            height: 4px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        /* Playlist */
        .playlist {
            position: relative;
            z-index: 1;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .playlist-title {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .playlist-count {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
        }

        .playlist-items {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 180px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .playlist-item.active {
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
        }

        .pl-num {
            color: rgba(255,255,255,0.2);
            font-size: 12px;
            width: 20px;
            text-align: center;
        }

        .pl-item-emoji { font-size: 22px; }

        .pl-info { flex: 1; }

        .pl-title {
            color: white;
            font-size: 13px;
            font-weight: 600;
        }

        .pl-artist {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
        }

        .pl-duration {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
        }

        .pl-playing {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 16px;
        }

        .pl-bar {
            width: 3px;
            background: var(--accent, #7c3aed);
            border-radius: 2px;
            animation: vizAnim 0.5s ease infinite alternate;
        }

        .pl-bar:nth-child(2) { animation-delay: 0.2s; }
        .pl-bar:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-card" id="playerCard">
            <div class="bg-blob bg-blob-1"></div>
            <div class="bg-blob bg-blob-2"></div>

            <!-- Album Art -->
            <div class="album-section">
                <div class="album-ring" id="albumRing">
                    <div class="album-art" id="albumArt">
                        <span id="songEmoji">🎵</span>
                    </div>
                </div>
                <div class="visualizer" id="visualizer">
                    <div class="viz-bar" style="height:8px"></div>
                    <div class="viz-bar" style="height:15px"></div>
                    <div class="viz-bar" style="height:6px"></div>
                    <div class="viz-bar" style="height:20px"></div>
                    <div class="viz-bar" style="height:10px"></div>
                    <div class="viz-bar" style="height:18px"></div>
                    <div class="viz-bar" style="height:8px"></div>
                    <div class="viz-bar" style="height:14px"></div>
                </div>
            </div>

            <!-- Song Info -->
            <div class="song-info">
                <div class="song-title" id="songTitle">Loading...</div>
                <div class="song-artist" id="songArtist">Artist</div>
                <div class="song-tags">
                    <span class="tag" id="genreTag" style="color:#7c3aed; border-color:#7c3aed">POP</span>
                    <span class="tag" style="color:rgba(255,255,255,0.4); border-color:rgba(255,255,255,0.2)">HQ</span>
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-section">
                <div class="time-row">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">3:30</span>
                </div>
                <div class="progress-track" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill" style="width:0%">
                        <div class="progress-dot"></div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
                <button class="ctrl-btn" onclick="prevSong()">⏮️</button>
                <button class="play-btn paused" id="playBtn" onclick="togglePlay()">▶️</button>
                <button class="ctrl-btn" onclick="nextSong()">⏭️</button>
                <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">🔁</button>
            </div>

            <!-- Volume -->
            <div class="volume-section">
                <span class="vol-icon" id="volIcon">🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" oninput="changeVolume(this.value)">
                <span style="color:rgba(255,255,255,0.4); font-size:12px;" id="volPercent">70%</span>
            </div>

            <!-- Playlist -->
            <div class="playlist">
                <div class="playlist-header">
                    <span class="playlist-title">UP NEXT</span>
                    <span class="playlist-count" id="playlistCount">0 songs</span>
                </div>
                <div class="playlist-items" id="playlistItems"></div>
            </div>
        </div>
    </div>

    <script>
        const songs = [
            { title: "Neon Lights", artist: "Synthwave Artist", emoji: "🌆", duration: "3:45", genre: "SYNTH", accent: "#7c3aed", accent2: "#06b6d4", totalSec: 225 },
            { title: "Ocean Vibes", artist: "Chill Collective", emoji: "🌊", duration: "4:12", genre: "CHILL", accent: "#0891b2", accent2: "#06ffa5", totalSec: 252 },
            { title: "Fire Dance", artist: "Electronic Duo", emoji: "🔥", duration: "3:28", genre: "DANCE", accent: "#ef4444", accent2: "#f97316", totalSec: 208 },
            { title: "Stargazer", artist: "Cosmic Beats", emoji: "⭐", duration: "5:02", genre: "AMBIENT", accent: "#8338ec", accent2: "#3a86ff", totalSec: 302 },
            { title: "Summer Rain", artist: "Acoustic Dreams", emoji: "🌧️", duration: "3:55", genre: "INDIE", accent: "#059669", accent2: "#0284c7", totalSec: 235 },
            { title: "Golden Hour", artist: "Lo-Fi Beats", emoji: "🌅", duration: "4:30", genre: "LO-FI", accent: "#d97706", accent2: "#f59e0b", totalSec: 270 },
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false;
        let currentSec = 0;
        let timerInterval = null;

        function loadSong(index) {
            const song = songs[index];
            currentIndex = index;
            currentSec = 0;

            document.getElementById('songTitle').textContent = song.title;
            document.getElementById('songArtist').textContent = song.artist;
            document.getElementById('songEmoji').textContent = song.emoji;
            document.getElementById('genreTag').textContent = song.genre;
            document.getElementById('totalTime').textContent = song.duration;
            document.getElementById('genreTag').style.color = song.accent;
            document.getElementById('genreTag').style.borderColor = song.accent;
            document.getElementById('progressFill').style.width = '0%';

            // Update colors
            document.querySelector('.bg-blob-1').style.background = song.accent;
            document.querySelector('.bg-blob-2').style.background = song.accent2;
            document.documentElement.style.setProperty('--accent', song.accent);
            document.documentElement.style.setProperty('--accent2', song.accent2);

            renderPlaylist();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');
            const ring = document.getElementById('albumRing');
            const art = document.getElementById('albumArt');
            const vizBars = document.querySelectorAll('.viz-bar');

            btn.textContent = isPlaying ? '⏸️' : '▶️';
            btn.classList.toggle('paused', !isPlaying);
            ring.classList.toggle('paused', !isPlaying);
            art.classList.toggle('paused', !isPlaying);

            vizBars.forEach(b => b.classList.toggle('playing', isPlaying));

            if (isPlaying) {
                timerInterval = setInterval(tickTimer, 1000);
            } else {
                clearInterval(timerInterval);
            }
        }

        function tickTimer() {
            const song = songs[currentIndex];
            currentSec++;
            if (currentSec >= song.totalSec) {
                if (isRepeat) {
                    currentSec = 0;
                } else {
                    nextSong();
                    return;
                }
            }
            const pct = (currentSec / song.totalSec) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('currentTime').textContent = formatTime(currentSec);
        }

        function formatTime(sec) {
            return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
        }

        function seek(e) {
            const track = e.currentTarget;
            const rect = track.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            const song = songs[currentIndex];
            currentSec = Math.floor(pct * song.totalSec);
            document.getElementById('progressFill').style.width = (pct * 100) + '%';
            document.getElementById('currentTime').textContent = formatTime(currentSec);
        }

        function nextSong() {
            clearInterval(timerInterval);
            let next;
            if (isShuffle) {
                next = Math.floor(Math.random() * songs.length);
            } else {
                next = (currentIndex + 1) % songs.length;
            }
            const wasPlaying = isPlaying;
            if (isPlaying) { isPlaying = false; }
            loadSong(next);
            if (wasPlaying) { isPlaying = true; }
            if (isPlaying) {
                timerInterval = setInterval(tickTimer, 1000);
                document.getElementById('playBtn').textContent = '⏸️';
                document.getElementById('playBtn').classList.remove('paused');
                document.getElementById('albumRing').classList.remove('paused');
                document.getElementById('albumArt').classList.remove('paused');
                document.querySelectorAll('.viz-bar').forEach(b => b.classList.add('playing'));
            }
        }

        function prevSong() {
            if (currentSec > 3) {
                currentSec = 0;
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('currentTime').textContent = '0:00';
                return;
            }
            clearInterval(timerInterval);
            const wasPlaying = isPlaying;
            if (isPlaying) { isPlaying = false; }
            loadSong((currentIndex - 1 + songs.length) % songs.length);
            if (wasPlaying) { isPlaying = true; }
            if (isPlaying) {
                timerInterval = setInterval(tickTimer, 1000);
                document.getElementById('playBtn').textContent = '⏸️';
                document.getElementById('playBtn').classList.remove('paused');
                document.getElementById('albumRing').classList.remove('paused');
                document.getElementById('albumArt').classList.remove('paused');
                document.querySelectorAll('.viz-bar').forEach(b => b.classList.add('playing'));
            }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
        }

        function changeVolume(val) {
            document.getElementById('volPercent').textContent = val + '%';
            const icon = document.getElementById('volIcon');
            icon.textContent = val == 0 ? '🔇' : val < 40 ? '🔈' : val < 70 ? '🔉' : '🔊';
        }

        function renderPlaylist() {
            const container = document.getElementById('playlistItems');
            document.getElementById('playlistCount').textContent = `${songs.length} songs`;

            container.innerHTML = songs.map((s, i) => `
                <div class="playlist-item ${i === currentIndex ? 'active' : ''}" onclick="changeSong(${i})">
                    <span class="pl-num">${i === currentIndex && isPlaying
                        ? `<span class="pl-playing">
                            <span class="pl-bar" style="height:8px"></span>
                            <span class="pl-bar" style="height:14px"></span>
                            <span class="pl-bar" style="height:6px"></span>
                           </span>`
                        : i + 1}</span>
                    <span class="pl-item-emoji">${s.emoji}</span>
                    <div class="pl-info">
                        <div class="pl-title">${s.title}</div>
                        <div class="pl-artist">${s.artist}</div>
                    </div>
                    <span class="pl-duration">${s.duration}</span>
                </div>
            `).join('');
        }

        function changeSong(index) {
            clearInterval(timerInterval);
            const wasPlaying = isPlaying;
            isPlaying = false;
            loadSong(index);
            if (wasPlaying) {
                isPlaying = true;
                timerInterval = setInterval(tickTimer, 1000);
                document.getElementById('playBtn').textContent = '⏸️';
                document.getElementById('playBtn').classList.remove('paused');
                document.getElementById('albumRing').classList.remove('paused');
                document.getElementById('albumArt').classList.remove('paused');
                document.querySelectorAll('.viz-bar').forEach(b => b.classList.add('playing'));
            }
        }

        loadSong(0);
    </script>
</body>
</html>
